<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>0503小組破冰題目</title>
	<style>
		@import url(http://fonts.googleapis.com/css?family=Open+Sans:300);
		html, body
		{
			margin:0;
			padding:0;
			width:100%;
			height:100%;
			font-family: 'Open Sans', sans-serif , 微軟正黑體;
		}

		#pagecontent
		{
			height: 100%;
			width: 100%;
			box-sizing: border-box;
			padding: 10px;
		}

		#card
		{
			width: 100%;
			box-sizing: border-box;
			border-radius: 10px;
			background-color: rgba(50,180,120,0.4);
			padding: 10px;
			box-shadow: 0 0 5px rgba(0,0,0,0.75);
		}

		#question
		{
			width: 100%;
			font-size: 2em;
			font-weight: bold;
			text-align: center;
			padding: 20px 0;
		}

		#changebtn
		{
			width: 60%;
			margin: 0 20%;
			padding: 5px;
			font-size: 1.5em;
			box-sizing: border-box;
			background-color: rgb(100,180,220);
			border: solid 1px rgb(100,100,100);
			border-radius: 10px;
			color: #000;
			text-align: center;

		}
	</style>
</head>
<body>
	<div id="pagecontent">
		<div id="card">
			<div id="question"></div>
			<div id="changebtn">換一個</div>
		</div>
	</div>

	<script>
		var alldata = ["諾亞方舟大洪水","摩西分紅海","以利亞乘著火車火馬升天","神吩咐烏鴉叼食物餵養以利亞",
			"以利亞和巴力的先知鬥法，求神從天降火","以利亞用外衣捲起，分開約旦河","大衛對戰哥利亞","耶和華神用地上的塵土造人","耶和華神就用那人身上所取的肋骨造成一個女人，領他到那人跟前 ","蛇誘騙夏娃吃分別善惡樹果子","最後的晚餐",
			"五餅二魚餵飽五千人","耶穌使水變成美酒","耶穌使拉撒路復活","耶穌戴荊棘冠冕騎驢進城","亞伯拉罕獻以撒","耶穌在馬槽降生","先知約拿被大魚吞沒",
			"該隱在田地裡面把亞伯殺掉","羅得的妻子變成鹽柱","耶穌被釘在十字架","耶穌的墳墓石頭被挪開，裡面是空的","耶穌乘著雲彩飛天","耶穌進入聖殿，趕出殿裡做買賣的人，推倒兌換銀錢之人的桌子，和賣鴿子之人的凳子","彼得船隊捕魚收穫慘淡",
			"施洗約翰為耶穌施洗，聖靈鴿子降臨","耶利哥城牆倒塌","對戰亞瑪力人，摩西舉手，以色列人就得勝","保羅往大馬士革的路上遇見主","雅各和神摔角","埃及十災-血災: 尼羅河的清水全變成血水","埃及十災-蛙災: 大量青蛙遍佈埃及",
			"埃及十災-虱災: 埃及人身上佈滿虱子","埃及十災-蠅災: 蒼蠅肆虐","埃及十災-畜疫之災:  家畜感染瘟疫死亡","埃及十災-瘡災: 成人長出起泡的疹子","埃及十災-雹災: 天降冰雹","埃及十災-蝗災: 蝗蟲佈滿埃及","埃及十災-黑暗之災: 三天三夜不見太陽",
			"埃及十災-殺長子之災: 所有埃及家庭的長子以及埃及一切頭生的牲畜死亡","人類蓋巴別塔","摩西領受十誡下山之後看見金牛犢","大衛在洞穴悄悄割下掃羅王的衣角","雅各終於站出來跪求以掃原諒","雅各在父親臨終前竊取長子名份","以掃和雅各出生的畫面，雅各抓著以掃的腳",
			"保羅西拉在監獄讚美神","耶穌醫治生來瘸腿的人","耶穌醫治一群大麻瘋病人","路加福音，大兒子和小兒子的比喻","耶穌在猶太人面前稱自己是神，猶太人要拿石頭打死他","但以理被丟入獅子坑中活下來","抹大拉馬利亞用真哪噠香膏塗抹在耶穌的腳上"
		];

		window.addEventListener('DOMContentLoaded',function () {
			change_content();
		});

		function enable_btn(bEnable)
		{
			if(bEnable)
			{
				document.getElementById("changebtn").style["background-color"] = "rgb(100,180,220)";
				document.getElementById("changebtn").addEventListener("click", change_content);
			}
			else
			{
				document.getElementById("changebtn").style["background-color"] = "rgba(100,100,100,0.5)";
				document.getElementById("changebtn").removeEventListener("click", change_content);
			}
		}

		var h_wait;
		function change_content()
		{
			document.getElementById("question").innerText = alldata[Math.floor(Math.random()*alldata.length)];
			enable_btn(false);

			// set time out disable
			var time_rest = 5;
			document.getElementById("changebtn").innerText = "換一個 (" + time_rest + ")";
			var h_wait = setInterval(function() {
				if(--time_rest == 0) {
					document.getElementById("changebtn").innerText = "換一個";
					clearInterval(h_wait);
					enable_btn(true);
				} else {
					document.getElementById("changebtn").innerText = "換一個 (" + time_rest + ")";
				}
			}, 1000);
		}
		
	</script>
</body>
</html>
